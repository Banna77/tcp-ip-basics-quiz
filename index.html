<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الاختبارات التفاعلية</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Cairo', 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            max-width: 1000px;
            width: 100%;
        }
        
        .header {
            text-align: center;
            margin-bottom: 60px;
            animation: fadeInDown 0.8s ease-out;
        }
        
        .header h1 {
            color: #00d4ff;
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }
        
        .header p {
            color: #a0aec0;
            font-size: 1.2em;
        }
        
        .quizzes {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }
        
        .quiz-card {
            background: rgba(20, 30, 60, 0.8);
            border: 2px solid #00d4ff;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.8s ease-out;
        }
        
        .quiz-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.1), transparent);
            transition: left 0.5s ease;
        }
        
        .quiz-card:hover::before {
            left: 100%;
        }
        
        .quiz-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.4);
            border-color: #00ff88;
        }
        
        .quiz-card h2 {
            color: #00d4ff;
            font-size: 1.8em;
            margin-bottom: 15px;
        }
        
        .quiz-card .questions-count {
            color: #00ff88;
            font-size: 2em;
            font-weight: bold;
            margin: 20px 0;
        }
        
        .quiz-card p {
            color: #cbd5e0;
            margin-bottom: 20px;
            line-height: 1.6;
        }
        
        .quiz-card .btn {
            display: inline-block;
            background: linear-gradient(135deg, #00d4ff, #00ff88);
            color: #0a0e27;
            padding: 12px 30px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            font-size: 1em;
        }
        
        .quiz-card .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }
        
        .footer {
            text-align: center;
            color: #718096;
            font-size: 0.9em;
            margin-top: 40px;
        }
        
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2em;
            }
            
            .quizzes {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎓 الاختبارات التفاعلية</h1>
            <p>اختر الاختبار الذي تريد الإجابة عليه</p>
        </div>
        
        <div class="quizzes">
            <div class="quiz-card">
                <h2>TCP/IP Basics</h2>
                <div class="questions-count">35</div>
                <p>اختبار شامل عن أساسيات بروتوكولات TCP/IP</p>
                <a href="./quiz-1-tcpip-basics/" class="btn">ابدأ الاختبار</a>
            </div>
            
            <div class="quiz-card">
                <h2>BAIT INT202 C4</h2>
                <div class="questions-count">40</div>
                <p>اختبار مقرر خدمات الشبكة - الجلسة الرابعة</p>
                <a href="./quiz-2-bait-int202/" class="btn">ابدأ الاختبار</a>
            </div>
        </div>
        
        <div class="footer">
            <p>© 2026 الاختبارات التفاعلية • تم التطوير بكل فخر</p>
        </div>
    </div>
</body>
</html>
