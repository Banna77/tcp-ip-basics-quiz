<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الاختبارات التفاعلية</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Cairo', 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            min-height: 100vh;
            color: #e2e8f0;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 50px;
            animation: fadeIn 0.8s ease-out;
        }
        .header h1 {
            color: #00d4ff;
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }
        .header p {
            color: #a0aec0;
            font-size: 1.2em;
        }
        .quizzes {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 50px;
        }
        .quiz-card {
            background: rgba(20, 30, 60, 0.8);
            border: 2px solid #00d4ff;
            border-radius: 15px;
            padding: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 250px;
        }
        .quiz-card:hover {
            background: rgba(30, 40, 80, 0.9);
            border-color: #00ff88;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
            transform: translateY(-5px);
        }
        .quiz-number {
            font-size: 3em;
            color: #00d4ff;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .quiz-title {
            font-size: 1.5em;
            color: #00ff88;
            margin-bottom: 10px;
            font-weight: 600;
        }
        .quiz-description {
            color: #cbd5e0;
            font-size: 1em;
            margin-bottom: 20px;
            flex-grow: 1;
        }
        .quiz-count {
            color: #a0aec0;
            font-size: 0.9em;
            padding-top: 15px;
            border-top: 1px solid rgba(0, 212, 255, 0.2);
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2em;
            }
            .quizzes {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎓 منصة الاختبارات</h1>
            <p>اختبر معلوماتك في مواضيع مختلفة</p>
        </div>

        <div class="quizzes">
            <a href="javascript:void(0);" onclick="loadQuiz('quiz00')" class="quiz-card">
                <div>
                    <div class="quiz-number">00</div>
                    <div class="quiz-title">TCP/IP Basics</div>
                    <div class="quiz-description">اختبر معلوماتك عن أساسيات بروتوكولات TCP/IP والشبكات</div>
                </div>
                <div class="quiz-count">35 سؤال</div>
            </a>

            <a href="javascript:void(0);" onclick="loadQuiz('quiz01')" class="quiz-card">
                <div>
                    <div class="quiz-number">01</div>
                    <div class="quiz-title">BAIT INT202 C4</div>
                    <div class="quiz-description">اختبر معلوماتك في مقرر خدمات الشبكة - الجلسة الرابعة</div>
                </div>
                <div class="quiz-count">40 سؤال</div>
            </a>
        </div>
    </div>

    <div id="quiz-container" style="display: none;"></div>

    <script>
        function loadQuiz(quizId) {
            const quizData = {
                quiz00: {
                    title: 'اختبار أساسيات TCP/IP',
                    subtitle: 'اختبر معلوماتك عن بروتوكولات الشبكة',
                    questions: [
                        {
                            type: 'mcq',
                            text: 'ما هو الغرض الأساسي من نموذج TCP/IP؟',
                            options: [
                                'توفير إطار عمل لتصميم الشبكات',
                                'تشفير البيانات',
                                'إدارة أجهزة الكمبيوتر',
                                'تصنيع الأجهزة'
                            ],
                            correct: 0,
                            explanation: 'نموذج TCP/IP يوفر إطار عمل شامل لتصميم وتطوير الشبكات والاتصالات.'
                        },
                        {
                            type: 'tf',
                            text: 'بروتوكول TCP يوفر نقل البيانات بشكل موثوق مع التحقق من الأخطاء',
                            correct: true,
                            explanation: 'نعم، TCP يوفر نقل موثوق مع التحقق من الأخطاء والتسليم المضمون.'
                        },
                        {
                            type: 'mcq',
                            text: 'كم عدد طبقات نموذج TCP/IP؟',
                            options: [
                                '3 طبقات',
                                '4 طبقات',
                                '5 طبقات',
                                '7 طبقات'
                            ],
                            correct: 1,
                            explanation: 'نموذج TCP/IP يتكون من 4 طبقات: التطبيق، النقل، الإنترنت، والوصول للشبكة.'
                        },
                        {
                            type: 'tf',
                            text: 'بروتوكول UDP يوفر نقل البيانات بدون ضمان التسليم',
                            correct: true,
                            explanation: 'نعم، UDP يوفر نقل سريع بدون ضمان التسليم أو التحقق من الأخطاء.'
                        },
                        {
                            type: 'mcq',
                            text: 'أي من البروتوكولات التالية يعمل في طبقة التطبيق؟',
                            options: [
                                'IP',
                                'TCP',
                                'HTTP',
                                'Ethernet'
                            ],
                            correct: 2,
                            explanation: 'HTTP يعمل في طبقة التطبيق ويستخدم لنقل صفحات الويب.'
                        }
                    ]
                },
                quiz01: {
                    title: 'اختبار BAIT INT202 C4',
                    subtitle: 'خدمات الشبكة - الجلسة الرابعة',
                    questions: [
                        {
                            type: 'mcq',
                            text: 'ما هو الفرق الأساسي بين نموذج Client-Server و P2P؟',
                            options: [
                                'لا يوجد فرق',
                                'في Client-Server يوجد خادم مركزي، بينما في P2P جميع الأجهزة متساوية',
                                'P2P أسرع دائماً',
                                'Client-Server يستخدم فقط للبريد الإلكتروني'
                            ],
                            correct: 1,
                            explanation: 'في Client-Server يوجد خادم مركزي يقدم الخدمات، بينما في P2P كل جهاز يعمل كعميل وخادم.'
                        },
                        {
                            type: 'tf',
                            text: 'عملية الاتصال بين البرامج تتطلب استخدام منافذ (Ports)',
                            correct: true,
                            explanation: 'نعم، المنافذ تحدد البرنامج المستقبل للبيانات على الجهاز.'
                        },
                        {
                            type: 'mcq',
                            text: 'كم عدد أنواع العناوين في الشبكات؟',
                            options: [
                                'نوع واحد فقط',
                                'نوعان: فيزيائي ومنطقي',
                                'ثلاثة أنواع: فيزيائي، منطقي، ومنفذ',
                                'أربعة أنواع'
                            ],
                            correct: 2,
                            explanation: 'هناك ثلاثة أنواع: العنوان الفيزيائي (MAC)، المنطقي (IP)، والمنفذ (Port).'
                        },
                        {
                            type: 'tf',
                            text: 'عنوان MAC يتغير عند انتقال البيانات بين الشبكات المختلفة',
                            correct: true,
                            explanation: 'نعم، عنوان MAC يتغير عند كل قفزة (hop) بين الأجهزة.'
                        },
                        {
                            type: 'mcq',
                            text: 'ما هو دور بروتوكول ARP؟',
                            options: [
                                'ترجمة أسماء النطاقات',
                                'تحويل عناوين IP إلى عناوين MAC',
                                'إدارة المنافذ',
                                'تشفير البيانات'
                            ],
                            correct: 1,
                            explanation: 'ARP يقوم بترجمة عناوين IP إلى عناوين MAC الفيزيائية.'
                        }
                    ]
                }
            };

            const quiz = quizData[quizId];
            if (!quiz) return;

            let currentQuestion = 0;
            let score = 0;
            let answered = [];

            function renderQuestion() {
                const q = quiz.questions[currentQuestion];
                const container = document.getElementById('quiz-container');
                
                let html = `
                    <div style="max-width: 900px; margin: 0 auto;">
                        <div style="background: rgba(20, 30, 60, 0.8); border: 2px solid #00d4ff; border-radius: 15px; padding: 30px; margin-bottom: 30px;">
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                                <h2 style="color: #00d4ff; font-size: 1.8em;">${quiz.title}</h2>
                                <button onclick="goHome()" style="background: #ff4444; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 1em;">العودة</button>
                            </div>
                            <div style="background: rgba(0, 212, 255, 0.1); padding: 10px; border-radius: 8px; margin-bottom: 20px;">
                                <div style="color: #a0aec0;">السؤال ${currentQuestion + 1} من ${quiz.questions.length}</div>
                                <div style="width: 100%; height: 8px; background: rgba(0, 212, 255, 0.2); border-radius: 4px; margin-top: 10px;">
                                    <div style="width: ${((currentQuestion + 1) / quiz.questions.length) * 100}%; height: 100%; background: #00d4ff; border-radius: 4px;"></div>
                                </div>
                            </div>
                            <h3 style="color: #00d4ff; font-size: 1.3em; margin-bottom: 20px;">${q.text}</h3>
                            <div id="options-container"></div>
                            <button id="submit-btn" onclick="submitAnswer()" style="width: 100%; background: #00d4ff; color: #0a0e27; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-size: 1.1em; font-weight: bold; margin-top: 20px;">تأكيد الإجابة</button>
                        </div>
                    </div>
                `;
                
                container.innerHTML = html;
                container.style.display = 'block';
                document.querySelector('.quizzes').parentElement.style.display = 'none';
                
                const optionsContainer = document.getElementById('options-container');
                
                if (q.type === 'mcq') {
                    q.options.forEach((opt, idx) => {
                        optionsContainer.innerHTML += `
                            <div onclick="selectOption(${idx})" id="option-${idx}" style="background: rgba(30, 40, 70, 0.6); border: 2px solid #4a5f8f; border-radius: 8px; padding: 15px; margin-bottom: 10px; cursor: pointer; transition: all 0.3s; color: #cbd5e0;">
                                ${opt}
                            </div>
                        `;
                    });
                } else {
                    optionsContainer.innerHTML = `
                        <div style="display: flex; gap: 20px;">
                            <div onclick="selectOption(true)" id="option-true" style="flex: 1; background: rgba(30, 40, 70, 0.6); border: 2px solid #4a5f8f; border-radius: 8px; padding: 20px; cursor: pointer; transition: all 0.3s; text-align: center; color: #cbd5e0; font-size: 1.2em; font-weight: bold;">
                                ✓ صحيح
                            </div>
                            <div onclick="selectOption(false)" id="option-false" style="flex: 1; background: rgba(30, 40, 70, 0.6); border: 2px solid #4a5f8f; border-radius: 8px; padding: 20px; cursor: pointer; transition: all 0.3s; text-align: center; color: #cbd5e0; font-size: 1.2em; font-weight: bold;">
                                ✗ خطأ
                            </div>
                        </div>
                    `;
                }
            }

            window.selectOption = function(idx) {
                answered[currentQuestion] = idx;
                const options = document.querySelectorAll('[id^="option-"]');
                options.forEach(opt => {
                    opt.style.background = 'rgba(30, 40, 70, 0.6)';
                    opt.style.borderColor = '#4a5f8f';
                });
                document.getElementById(`option-${idx}`).style.background = 'rgba(0, 212, 255, 0.2)';
                document.getElementById(`option-${idx}`).style.borderColor = '#00d4ff';
            };

            window.submitAnswer = function() {
                const q = quiz.questions[currentQuestion];
                const userAnswer = answered[currentQuestion];
                
                if (userAnswer === undefined) {
                    alert('الرجاء اختيار إجابة');
                    return;
                }

                if (userAnswer === q.correct) {
                    score++;
                }

                const container = document.getElementById('quiz-container');
                container.innerHTML = `
                    <div style="max-width: 900px; margin: 0 auto;">
                        <div style="background: rgba(20, 30, 60, 0.8); border: 2px solid #00d4ff; border-radius: 15px; padding: 30px; margin-bottom: 30px;">
                            <div style="text-align: center; margin-bottom: 20px;">
                                ${userAnswer === q.correct ? '<div style="color: #00ff88; font-size: 3em;">✓</div>' : '<div style="color: #ff4444; font-size: 3em;">✗</div>'}
                            </div>
                            <h3 style="color: #00d4ff; font-size: 1.3em; margin-bottom: 20px;">الإجابة ${userAnswer === q.correct ? 'صحيحة' : 'خاطئة'}</h3>
                            <div style="background: rgba(0, 212, 255, 0.1); padding: 15px; border-radius: 8px; margin-bottom: 20px; color: #cbd5e0;">
                                <strong>التفسير:</strong> ${q.explanation}
                            </div>
                            <button onclick="nextQuestion()" style="width: 100%; background: #00d4ff; color: #0a0e27; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-size: 1.1em; font-weight: bold;">
                                ${currentQuestion + 1 === quiz.questions.length ? 'عرض النتيجة' : 'السؤال التالي'}
                            </button>
                        </div>
                    </div>
                `;
            };

            window.nextQuestion = function() {
                currentQuestion++;
                if (currentQuestion === quiz.questions.length) {
                    showResults();
                } else {
                    renderQuestion();
                }
            };

            function showResults() {
                const percentage = Math.round((score / quiz.questions.length) * 100);
                const container = document.getElementById('quiz-container');
                container.innerHTML = `
                    <div style="max-width: 900px; margin: 0 auto;">
                        <div style="background: rgba(20, 30, 60, 0.8); border: 2px solid #00d4ff; border-radius: 15px; padding: 40px; text-align: center;">
                            <h2 style="color: #00d4ff; font-size: 2.5em; margin-bottom: 20px;">🎉 تم إكمال الاختبار</h2>
                            <div style="background: rgba(0, 212, 255, 0.1); padding: 30px; border-radius: 8px; margin-bottom: 30px;">
                                <div style="font-size: 3em; color: #00ff88; font-weight: bold; margin-bottom: 10px;">${score}/${quiz.questions.length}</div>
                                <div style="font-size: 1.5em; color: #00d4ff;">${percentage}%</div>
                            </div>
                            <button onclick="goHome()" style="background: #00d4ff; color: #0a0e27; border: none; padding: 15px 30px; border-radius: 8px; cursor: pointer; font-size: 1.1em; font-weight: bold;">العودة للرئيسية</button>
                        </div>
                    </div>
                `;
            }

            renderQuestion();
        }

        function goHome() {
            document.getElementById('quiz-container').style.display = 'none';
            document.querySelector('.quizzes').parentElement.style.display = 'block';
            location.reload();
        }
    </script>
</body>
</html>
